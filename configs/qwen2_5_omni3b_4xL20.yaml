# ============================================================
# Qwen2.5-Omni-3B 原生方案（与 whisper+qwen 方案完全独立）。
#
# 思路：把"音频 + ASR 文本 + 历史 chunk 标签"全部铺进【一段多模态对话】，
# 交给 Omni-3B 的 thinker 联合编码，取最后一层 hidden state 池化后接 5 路
# sigmoid 分类头（不做生成解码）。LoRA 微调 thinker，冻结骨干。
#
# 训练入口：src/train_omni.py（torchrun 4 卡 DDP）。
# 标签 / 窗口 / 指标与 whisper 方案保持一致，便于横向对比 macro_best_f1。
# ============================================================

seed: 42
chunk_ms: 80
context_chunks: 375          # 上下文最长 375 chunk = 30s
target_chunks: 25            # 预测未来 25 chunk = 2s
stride: 2
sample_rate: 16000
max_train_samples: null
max_valid_samples: null
num_workers: 8

data_augmentation:
  dynamic_context: true
  min_context_chunks: 125
  max_context_chunks: 375
  context_prob: 0.5

paths:
  project_root: /mnt/workspace/dorihue/finvcup_2026
  train_audio_dir: /mnt/workspace/dorihue/finvcup_2026/train/audio
  train_text_dir: /mnt/workspace/dorihue/finvcup_2026/train/text
  train_labels_dir: /mnt/workspace/dorihue/finvcup_2026/train/labels

  output_root: /mnt/workspace/dorihue/finvcup_2026/outputs/omni3b
  checkpoints_dir: /mnt/workspace/dorihue/finvcup_2026/outputs/omni3b/checkpoints
  logs_dir: /mnt/workspace/dorihue/finvcup_2026/outputs/omni3b/logs

  cache_root: /mnt/workspace/dorihue/finvcup_2026/.cache

labels:
  C: 0
  T: 1
  BC: 2
  I: 3
  NA: 4
  positive_ids: [1, 2, 3]
  multi_targets: [C, NA, I, BC, T]      # → 输出列 c,na,i,bc,t（与 whisper 方案一致）

split:
  valid_ratio: 0.1
  by_conversation: true

# ---- Omni-3B 骨干 ----
omni:
  # ⚠️ 用户下载目录是 /mnt/workspace/dorihue/modelscope/Qwen2.5-Omni-3（疑似被截断）。
  #    请核对真实文件夹名（通常是 Qwen2.5-Omni-3B），改成实际路径。
  model_path: /mnt/workspace/dorihue/modelscope/Qwen2.5-Omni-3B
  torch_dtype: bfloat16
  attn_implementation: sdpa             # 若装了 flash-attn 可改 flash_attention_2
  enable_audio_output: false            # 不加载 talker（语音生成头），省显存
  gradient_checkpointing: true
  audio_mono: true                      # 双声道取均值喂单声道（Omni 音频输入为单声道）
  pooling: masked_mean                  # masked_mean | last_token
  max_text_tokens: 512                  # ASR+历史 verbalize 后文本 token 上限（processor 截断）

# ---- 历史 chunk 标签的文本化（Omni 没有结构入口，统一铺进 prompt）----
history:
  include: true
  history_chunks: 125                   # 取最近 125 chunk(=10s) 标签做 RLE
  encoding: rle                         # 运行长度编码（紧凑且带时长）

# ---- LoRA（仅适配 thinker 的注意力/MLP 投影；骨干冻结）----
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  # 仅匹配 thinker 文本解码层，排除 audio_tower（见 omni_turntaking.py 的正则构造）
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  restrict_to_language_model: true      # true=只在 thinker LLM 层加 LoRA，不动音频塔

# ---- 分类头 ----
head:
  hidden_dim: 512
  dropout: 0.2

train:
  multi_label: true
  pos_weight_mode: capped_per_label
  pos_weight_cap: 8.0
  focal_gamma: 2.0
  label_smoothing: 0.05

  epochs: 30                            # 充分训练：早停(patience)兜底，跑不满会自动停
  max_steps_per_epoch: 400              # 单步比 whisper 方案重，限制每 epoch 步数控制时长
  eval_valid_sample_count: 6000         # 3B 评估慢，验证取样少些（rank0 评估）
  eval_valid_max_batches: null
  eval_valid_shuffle: false

  # 有效批 = batch_size(每卡16) × 4卡 × grad_accum(8) = 512（显存够，每卡 batch 提到 16）
  batch_size: 16
  eval_batch_size: 32
  log_every_steps: 20
  gradient_accumulation_steps: 8

  learning_rate: 2.0e-4                 # LoRA + 头 的学习率（有效批 128→512，按 √4=2x 上调）
  warmup_ratio: 0.03
  weight_decay: 0.0
  ema_decay: 0.999
  grad_clip_norm: 1.0
  use_amp: true
  amp_dtype: bfloat16                   # bf16 自动混合精度，不用 GradScaler
  use_ema: true

  save_metric: best_f1                  # = macro_best_f1（与 whisper 方案同口径）
  best_checkpoint_name: best_omni3b.pt
  early_stop_patience: 10

  ensemble_topk: 5

env:
  HF_HOME: /mnt/workspace/dorihue/finvcup_2026/.cache/huggingface
  TRANSFORMERS_CACHE: /mnt/workspace/dorihue/finvcup_2026/.cache/huggingface
  TORCH_HOME: /mnt/workspace/dorihue/finvcup_2026/.cache/torch
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  TOKENIZERS_PARALLELISM: "false"
