seed: 42
chunk_ms: 80
context_chunks: 375
target_chunks: 25
stride: 2
sample_rate: 16000
max_train_samples: null
max_valid_samples: null
num_workers: 8

data_augmentation:
  dynamic_context: true
  min_context_chunks: 125
  max_context_chunks: 375
  context_prob: 0.5

# ============================================================
# VAP 窗口学习式池化（第5模态升级）：在 lmf_vapfeat 基础上，把 VAP 先验从
# 边界单帧 [18] 升级为边界前 N=20 帧轨迹 [20,18]，模型内用 conv1d + 注意力
# 池化自学时序权重（VapWindowEncoder）。训练缓存沿用 lmf_vapfeat 的整段
# [F,18]（无需重算）；推理需用 src.precompute_vap_test --window 20 重算 test
# 缓存为 (20,18)。独立输出目录，与 lmf_vapfeat 干净 A/B。
# ============================================================
paths:
  project_root: /root/autodl-tmp/finvcup_2026
  train_audio_dir: /root/autodl-tmp/finvcup_2026/train/audio
  train_text_dir: /root/autodl-tmp/finvcup_2026/train/text
  train_labels_dir: /root/autodl-tmp/finvcup_2026/train/labels

  output_root: /root/autodl-tmp/finvcup_2026/outputs/lmf_dualvap
  checkpoints_dir: /root/autodl-tmp/finvcup_2026/outputs/lmf_dualvap/checkpoints
  logs_dir: /root/autodl-tmp/finvcup_2026/outputs/lmf_dualvap/logs

  cache_root: /root/autodl-tmp/finvcup_2026/.cache

labels:
  C: 0
  T: 1
  BC: 2
  I: 3
  NA: 4
  positive_ids: [1, 2, 3]
  multi_targets: [C, NA, I, BC, T]

split:
  valid_ratio: 0.1
  by_conversation: true

audio_encoder:
  type: whisper
  model_name: /root/autodl-tmp/finvcup_2026/models/whisper-large-v3
  proj_dim: 512
  freeze: true
  unfreeze_layers: 2
  tail_ratio: 0.25
  # 组合(#1+#2)：dualch 双声道活动分支 + vapwin VAP 窗口(下方 vap_feat.window)
  stereo_branch:
    enabled: true
    n_mels: 64
    conv_channels: [32, 64, 96]
    tail_sec: 6.0
    dropout: 0.1

text_encoder:
  model_name: /root/autodl-tmp/finvcup_2026/models/Qwen3-0.6B
  max_length: 256
  freeze_backbone: true

context_encoder:
  vocab_size: 5
  embed_dim: 24
  channels: [48, 96]
  tail_k: 75

fusion:
  hidden_dim: 320
  bilinear_rank: 64
  dropout: 0.25

train:
  multi_label: true
  pos_weight_mode: capped_per_label
  pos_weight_cap: 8.0
  focal_gamma: 2.0
  label_smoothing: 0.05

  epochs: 40
  max_steps_per_epoch: 1000
  eval_valid_sample_count: 40000
  eval_valid_max_batches: null
  eval_valid_shuffle: false

  batch_size: 64
  eval_batch_size: 256
  log_every_steps: 40
  gradient_accumulation_steps: 1

  learning_rate: 1.2e-4
  warmup_ratio: 0.03
  weight_decay: 0.03
  ema_decay: 0.999
  grad_clip_norm: 1.0
  use_amp: true
  use_ema: true

  save_metric: best_f1
  best_checkpoint_name: best_lmf_dualvap.pt
  early_stop_patience: 15

  ensemble_topk: 5

# VAP 辅助头：本实验关闭（用"窗口特征"而非"辅助任务"）
vap_aux:
  enabled: false

# ============================================================
# VAP 特征晚融合（第5模态）窗口版。需先用 src.precompute_vap 把逐帧特征缓存到
# cache_dir（整段 [F,18]，与 lmf_vapfeat 共用，无需重算）。
#   feat_dim=18: [p_now(2), p_future(2), vad(2), p_bins(8), p_bins_now(2), p_bins_future(2)]
#   window=20: 取边界前 20 帧（@10Hz=2.0s）轨迹 [20,18]，模型内 conv1d + 注意力池化。
#   frame_rate=10: 与预计算一致；dataset 按 end_idx 映射 vap_frame=round(end_idx*chunk_ms*fr/1000)。
# 推理：src.precompute_vap_test --window 20 产出 (20,18) 的 per-segment 缓存。
# ============================================================
vap_feat:
  enabled: true
  feat_dim: 18
  window: 20
  conv_channels: 64
  frame_rate: 10
  cache_dir: /root/autodl-tmp/finvcup_2026/.cache/vap_ch_kyoto

env:
  HF_HOME: /root/autodl-tmp/finvcup_2026/.cache/huggingface
  TRANSFORMERS_CACHE: /root/autodl-tmp/finvcup_2026/.cache/huggingface
  TORCH_HOME: /root/autodl-tmp/finvcup_2026/.cache/torch
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
