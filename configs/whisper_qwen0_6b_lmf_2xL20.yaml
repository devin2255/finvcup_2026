seed: 42
chunk_ms: 80
context_chunks: 375
target_chunks: 25
stride: 2  # Phase 1: 从5改为2，增加样本密度
sample_rate: 16000
max_train_samples: null
max_valid_samples: null
num_workers: 8           # 2xL20: 云服务器 CPU 核多，加大数据加载并行（每张卡各起 num_workers 个）

# Phase 1: 添加动态上下文配置
data_augmentation:
  dynamic_context: true
  min_context_chunks: 125    # 最少10秒 (125*80ms)
  max_context_chunks: 375    # 最多30秒
  context_prob: 0.5          # 50%概率使用动态长度

# ============================================================
# 路径：默认按 AutoDL（数据盘 /root/autodl-tmp，系统盘小）。
# 上云后只需把 project_root 改成你实际解压数据的目录，其余自动拼接。
# ============================================================
paths:
  project_root: /mnt/workspace/dorihue/finvcup_2026
  train_audio_dir: /mnt/workspace/dorihue/finvcup_2026/train/audio
  train_text_dir: /mnt/workspace/dorihue/finvcup_2026/train/text
  train_labels_dir: /mnt/workspace/dorihue/finvcup_2026/train/labels

  output_root: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_2xL20
  checkpoints_dir: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_2xL20/checkpoints
  logs_dir: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_2xL20/logs

  cache_root: /mnt/workspace/dorihue/finvcup_2026/.cache

labels:
  C: 0
  T: 1
  BC: 2
  I: 3
  NA: 4
  positive_ids: [1, 2, 3]
  multi_targets: [C, NA, I, BC, T]

split:
  valid_ratio: 0.1
  by_conversation: true

audio_encoder:
  type: whisper
  model_name: /mnt/workspace/dorihue/modelscope/models/whisper-large-v3  # 本地路径，注意核对文件夹真实名字
  proj_dim: 512
  freeze: true
  unfreeze_layers: 4         # 2xL20 显存充裕：多解冻2层做任务适配（总参数不变，集成预算不受影响）
  tail_ratio: 0.25
  stereo: true               # 双声道分别过共享编码器后拼接(+通道差)；直击 I(重叠)/BC(附和) 的跨声道信号。权重共享，参数量不变

text_encoder:
  model_name: /mnt/workspace/dorihue/modelscope/models/Qwen3-0.6B  # 本地路径
  max_length: 256
  freeze_backbone: true

# Phase 2: 增强context_encoder
context_encoder:
  vocab_size: 5
  embed_dim: 24
  channels: [48, 96]
  tail_k: 75

# Phase 2: 增强fusion
fusion:
  hidden_dim: 320
  bilinear_rank: 64
  dropout: 0.25

train:
  multi_label: true
  pos_weight_mode: capped_per_label
  pos_weight_cap: 8.0
  focal_gamma: 2.0
  label_smoothing: 0.05

  # ===== 新增提分项 =====
  oversample_bc: 3           # BC 正例物理过采样倍数(>1生效)，缓解 3.65% 极端不均衡
  aux_chunk_weight: 0.3      # 辅助 chunk 级 5 类监督的损失权重(0关闭)；更密的稀有事件时序信号
  use_ema: true              # 真权重 EMA；评估/保存/推理用 EMA 权重

  epochs: 80
  max_steps_per_epoch: 1000
  eval_valid_sample_count: 4000  # 阈值/选优要足够正例：BC 仅 3.65%，500 太小会让阈值很噪。建议训练后再用 tune_threshold.py 在全量 valid 上重拟合
  eval_valid_max_batches: null
  eval_valid_shuffle: false

  # ===== 2xL20 显存放开后的核心改动 =====
  # stereo=true 时音频前向跑两遍(双声道)，激活显存约翻倍，故 batch 从 48 砍到 24；
  # 配 grad_accum=2 维持等效 batch=24*2卡*2=96。若仍 OOM，把 batch_size 降到 16、grad_accum 升到 3。
  batch_size: 24
  eval_batch_size: 48      # 评估只在 rank0 跑全量、no_grad；stereo 下也相应减半
  log_every_steps: 40

  # 等效 batch = batch_size(24) * 显卡数(2) * grad_accum(2) = 96
  gradient_accumulation_steps: 2

  learning_rate: 8.0e-5    # 等效 batch ~96，沿用 8e-5
  warmup_ratio: 0.05
  ema_decay: 0.995
  weight_decay: 0.01
  grad_clip_norm: 1.0
  use_amp: true
  save_metric: best_f1
  best_checkpoint_name: best_lmf_2xL20.pt
  early_stop_patience: 10

  # 集成推理：除最优模型外，再保留按 valid 指标排名的 top-N 个 checkpoint。
  # 单模型≈1.24B(Whisper-enc 637M + Qwen3-0.6B 596M + 自定义~8M)，
  # N*1.24B 必须≤8B → 硬上限 6；取 5 留余量(6.2B)。0 表示关闭。
  ensemble_topk: 5
  ensemble_min_epoch_gap: 2   # 成员至少相隔2个epoch，避免选一堆相邻epoch而失去集成多样性

env:
  HF_HOME: /mnt/workspace/dorihue/finvcup_2026/.cache/huggingface
  TRANSFORMERS_CACHE: /mnt/workspace/dorihue/finvcup_2026/.cache/huggingface
  TORCH_HOME: /mnt/workspace/dorihue/finvcup_2026/.cache/torch
  # 模型已在本地，强制离线，避免任何联网探测
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
