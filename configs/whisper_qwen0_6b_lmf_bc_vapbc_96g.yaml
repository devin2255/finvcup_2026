seed: 42
chunk_ms: 80
context_chunks: 375
target_chunks: 25
stride: 2
sample_rate: 16000
max_train_samples: null
max_valid_samples: null
num_workers: 4

data_augmentation:
  dynamic_context: true
  min_context_chunks: 125
  max_context_chunks: 375
  context_prob: 0.5

paths:
  project_root: /root/autodl-tmp/finvcup_2026
  train_audio_dir: /root/autodl-tmp/finvcup_2026/train/audio
  train_text_dir: /root/autodl-tmp/finvcup_2026/train/text
  train_labels_dir: /root/autodl-tmp/finvcup_2026/train/labels

  output_root: /root/autodl-tmp/finvcup_2026/outputs/lmf_bc_vapbc_96g
  checkpoints_dir: /root/autodl-tmp/finvcup_2026/outputs/lmf_bc_vapbc_96g/checkpoints
  logs_dir: /root/autodl-tmp/finvcup_2026/outputs/lmf_bc_vapbc_96g/logs

  cache_root: /root/autodl-tmp/finvcup_2026/.cache

labels:
  C: 0
  T: 1
  BC: 2
  I: 3
  NA: 4
  positive_ids: [1, 2, 3]
  multi_targets: [C, NA, I, BC, T]

split:
  valid_ratio: 0.1
  by_conversation: true

audio_encoder:
  type: whisper
  model_name: /root/autodl-tmp/finvcup_2026/models/whisper-large-v3
  proj_dim: 512
  freeze: true
  unfreeze_layers: 1
  tail_ratio: 0.25
  stereo_branch:
    enabled: true
    n_mels: 64
    conv_channels: [32, 64, 96]
    tail_sec: 6.0
    dropout: 0.1
    time_pool: attn_max

text_encoder:
  model_name: /root/autodl-tmp/finvcup_2026/models/Qwen3-0.6B
  max_length: 256
  freeze_backbone: true

context_encoder:
  vocab_size: 5
  embed_dim: 24
  channels: [48, 96]
  tail_k: 75

fusion:
  hidden_dim: 320
  bilinear_rank: 64
  dropout: 0.25

train:
  multi_label: true
  pos_weight_mode: capped_per_label
  pos_weight_cap: 8.0
  pos_weight_cap_per_label:
    bc: 16.0
  focal_gamma: 2.0
  label_smoothing: 0.05

  epochs: 40
  max_steps_per_epoch: 1000
  eval_valid_sample_count: 30000
  eval_valid_max_batches: null
  eval_valid_shuffle: false

  batch_size: 32
  eval_batch_size: 64
  log_every_steps: 40
  gradient_accumulation_steps: 2

  learning_rate: 5.0e-5
  warmup_ratio: 0.05
  weight_decay: 0.01
  ema_decay: 0.995
  grad_clip_norm: 1.0
  use_amp: true
  use_ema: true

  save_metric: best_f1
  best_checkpoint_name: best_lmf_bc_vapbc_96g.pt
  early_stop_patience: 15

  ensemble_topk: 5

vap_aux:
  enabled: false

vap_feat:
  enabled: true
  feat_dim: 21
  frame_rate: 10
  cache_dir: /root/autodl-tmp/finvcup_2026/.cache/vap_bc_ch_21d

env:
  HF_HOME: /root/autodl-tmp/finvcup_2026/.cache/huggingface
  TRANSFORMERS_CACHE: /root/autodl-tmp/finvcup_2026/.cache/huggingface
  TORCH_HOME: /root/autodl-tmp/finvcup_2026/.cache/torch
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
