seed: 42
chunk_ms: 80
context_chunks: 375
target_chunks: 25
stride: 2  # Phase 1: 从5改为2，增加样本密度
sample_rate: 16000
max_train_samples: null
max_valid_samples: null
num_workers: 8           # 每个 rank 各起 num_workers 个：4卡=4×8=32 进程；若 CPU 吃紧改 4~6

# Phase 1: 添加动态上下文配置
data_augmentation:
  dynamic_context: true
  min_context_chunks: 125    # 最少10秒 (125*80ms)
  max_context_chunks: 375    # 最多30秒
  context_prob: 0.5          # 50%概率使用动态长度

# ============================================================
# 路径：沿用租用服务器约定（Linux + 本地模型 + 离线）。
# 4卡输出目录独立（lmf_ensemble_4xL20），不会覆盖 2卡(lmf_ensemble) 的 checkpoint。
# 上服务器后只需把 project_root 改成实际解压数据的目录，其余自动拼接。
# ============================================================
paths:
  project_root: /mnt/workspace/dorihue/finvcup_2026
  train_audio_dir: /mnt/workspace/dorihue/finvcup_2026/train/audio
  train_text_dir: /mnt/workspace/dorihue/finvcup_2026/train/text
  train_labels_dir: /mnt/workspace/dorihue/finvcup_2026/train/labels

  output_root: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_ensemble_4xL20
  checkpoints_dir: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_ensemble_4xL20/checkpoints
  logs_dir: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_ensemble_4xL20/logs

  cache_root: /mnt/workspace/dorihue/finvcup_2026/.cache

labels:
  C: 0
  T: 1
  BC: 2
  I: 3
  NA: 4
  positive_ids: [1, 2, 3]
  multi_targets: [C, NA, I, BC, T]

split:
  valid_ratio: 0.1
  by_conversation: true

audio_encoder:
  type: whisper
  model_name: /mnt/workspace/dorihue/modelscope/whisper-large-v3  # 本地路径，注意核对文件夹真实名字
  proj_dim: 512
  freeze: true
  unfreeze_layers: 2         # 保持 8g_optimized 设置（其它优化不调整）
  tail_ratio: 0.25           # 保持 8g_optimized 设置

text_encoder:
  model_name: /mnt/workspace/dorihue/modelscope/Qwen3-0.6B  # 本地路径
  max_length: 256
  freeze_backbone: true

# Phase 2: 增强context_encoder
context_encoder:
  vocab_size: 5
  embed_dim: 24              # 从16增加到24
  channels: [48, 96]         # 从[32,64]增加到[48,96]
  tail_k: 75                 # 从50增加到75

# Phase 2: 增强fusion
fusion:
  hidden_dim: 320            # 从256增加到320
  bilinear_rank: 64          # 从48增加到64
  dropout: 0.25              # 从0.2增加到0.25

train:
  multi_label: true
  pos_weight_mode: capped_per_label
  pos_weight_cap: 8.0        # 保持 8g_optimized 设置
  focal_gamma: 2.0           # 保持 8g_optimized 设置
  label_smoothing: 0.05      # 保持 8g_optimized 设置

  epochs: 80
  max_steps_per_epoch: 1000       # 原 8g_optimized: 20000
  eval_valid_sample_count: 30000   # 原 8g_optimized: 8000
  eval_valid_max_batches: null
  eval_valid_shuffle: false

  # ============================================================
  # 4×L20(48G) 四卡 DDP 核心配置
  #   等效批 = batch_size(每卡) × 卡数(4) × grad_accum
  #   稳妥:   48  × 4 × 1 = 192 → lr 1.5e-4（每卡~18G）
  #   较大:   96  × 4 × 1 = 384 → lr 2.0e-4，warmup 0.08
  #   本配置: 128 × 4 × 1 = 512 → lr 2.4e-4，warmup 0.10（每卡~28-30G，建议先冒烟测显存）
  # ============================================================
  batch_size: 128            # 每卡 128（4卡等效批 512）。原 8g_optimized: 1。每卡约 28-30G，先冒烟测；OOM 则降到 96
  eval_batch_size: 256       # 仅 rank0/no_grad（单卡48G）。256 在 48G 上一般够；若 eval 阶段 OOM 降到 128
  log_every_steps: 40

  gradient_accumulation_steps: 1   # 原 8g_optimized: 8

  # lr 按等效批 sqrt 缩放（AdamW 推荐）：lr = 3e-5 × sqrt(等效批 / 8)。
  #   等效批 8(原始)→3e-5；192→~1.5e-4；384→~2.0e-4；512→~2.4e-4。
  # 当前 2.4e-4 对应“等效批 512”(= batch_size 128 × 四卡)。改回 96→2.0e-4，48→1.5e-4。
  learning_rate: 2.4e-4      # 原 8g_optimized: 3e-5（等效批8）；等效批512按 sqrt 缩放：3e-5×√(512/8)=2.4e-4
  warmup_ratio: 0.10         # 原 8g_optimized: 0.05；等效批512增大，warmup 提到 0.10 更稳
  ema_decay: 0.995           # 保持 8g_optimized 设置
  weight_decay: 0.01
  grad_clip_norm: 1.0
  use_amp: true
  save_metric: best_f1       # 排序指标：验证集 macro best-F1（各标签用各自最优阈值的 F1 再平均）
  best_checkpoint_name: best_lmf_ensemble.pt   # 原 8g_optimized: best_lmf_optimized.pt（已在独立的 4xL20 目录下）
  early_stop_patience: 15    # 保持 8g_optimized 设置

  # 集成推理：除最优模型外，再按 valid best_f1 排名保留 top-N 个 checkpoint。
  # 每个成员自带各标签最优阈值，写入 ensemble_manifest.json。
  # 推理参数预算：单模型≈1.24B(Whisper-enc 637M + Qwen3-0.6B 596M + 自定义~8M)，
  # 5*1.24B=6.2B ≤ 8B 上限。topk=5 即“best + 4 个次优”。0 表示关闭。
  # 成员 checkpoint 瘦身（仅存可训练参数），推理时从本地预训练骨干重建后叠加。
  ensemble_topk: 5           # 原 8g_optimized: 未设置（=0，关闭集成保存）

env:
  HF_HOME: /mnt/workspace/dorihue/finvcup_2026/.cache/huggingface
  TRANSFORMERS_CACHE: /mnt/workspace/dorihue/finvcup_2026/.cache/huggingface
  TORCH_HOME: /mnt/workspace/dorihue/finvcup_2026/.cache/torch
  # 模型已在本地，强制离线，避免任何联网探测
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
