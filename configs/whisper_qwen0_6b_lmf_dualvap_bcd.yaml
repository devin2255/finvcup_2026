seed: 42
chunk_ms: 80
context_chunks: 375
target_chunks: 25
stride: 2
sample_rate: 16000
max_train_samples: null
max_valid_samples: null
num_workers: 8

# ============================================================
# lmf_dualvap_bcd = lmf_dualvap（dualch stereo + vapwin 窗口特征）叠加：
#   ③ BC 逐 chunk 密集监督（bc_dense 辅助头，25x 监督信号专攻 BC）
#   ④ 动态上下文增广扩到 (0,30]（min 125->25 chunk，对齐私榜动态上下文）
# 与 lmf_dualvap 干净 A/B：只差 bc_dense 段与 min_context_chunks。
# ============================================================
data_augmentation:
  dynamic_context: true
  # 私榜上下文为 (0,30] 秒动态时长；训练随机裁短到最少 2s（25 chunk），
  # 让模型适应短上下文（短于 context_chunks 的部分标签用 NA=4 左侧补齐，
  # 与 TurnTakingTestDataset 的归一化规则一致）。
  min_context_chunks: 25
  max_context_chunks: 375
  context_prob: 0.5

paths:
  project_root: /root/autodl-tmp/finvcup_2026
  train_audio_dir: /root/autodl-tmp/finvcup_2026/train/audio
  train_text_dir: /root/autodl-tmp/finvcup_2026/train/text
  train_labels_dir: /root/autodl-tmp/finvcup_2026/train/labels

  output_root: /root/autodl-tmp/finvcup_2026/outputs/lmf_dualvap_bcd
  checkpoints_dir: /root/autodl-tmp/finvcup_2026/outputs/lmf_dualvap_bcd/checkpoints
  logs_dir: /root/autodl-tmp/finvcup_2026/outputs/lmf_dualvap_bcd/logs

  cache_root: /root/autodl-tmp/finvcup_2026/.cache

labels:
  C: 0
  T: 1
  BC: 2
  I: 3
  NA: 4
  positive_ids: [1, 2, 3]
  multi_targets: [C, NA, I, BC, T]

split:
  valid_ratio: 0.1
  by_conversation: true

audio_encoder:
  type: whisper
  model_name: /root/autodl-tmp/finvcup_2026/models/whisper-large-v3
  proj_dim: 512
  freeze: true
  unfreeze_layers: 2
  tail_ratio: 0.25
  stereo_branch:
    enabled: true
    n_mels: 64
    conv_channels: [32, 64, 96]
    tail_sec: 6.0
    dropout: 0.1

text_encoder:
  model_name: /root/autodl-tmp/finvcup_2026/models/Qwen3-0.6B
  max_length: 256
  freeze_backbone: true

context_encoder:
  vocab_size: 5
  embed_dim: 24
  channels: [48, 96]
  tail_k: 75

fusion:
  hidden_dim: 320
  bilinear_rank: 64
  dropout: 0.25

train:
  multi_label: true
  pos_weight_mode: capped_per_label
  pos_weight_cap: 8.0
  focal_gamma: 2.0
  label_smoothing: 0.05

  epochs: 40
  max_steps_per_epoch: 1000
  eval_valid_sample_count: 40000
  eval_valid_max_batches: null
  eval_valid_shuffle: false

  # 单卡 RTX 5090：batch 64（等效批量从 4 卡 512 降到 64），lr 按
  # lmf_dualvapbc_5090 同卡已验证配方降到 8e-5；eval_batch 128 防峰值 OOM。
  batch_size: 64
  eval_batch_size: 128
  log_every_steps: 40
  gradient_accumulation_steps: 1

  learning_rate: 8.0e-5
  warmup_ratio: 0.04
  weight_decay: 0.02
  ema_decay: 0.999
  grad_clip_norm: 1.0
  use_amp: true
  use_ema: true

  save_metric: best_f1
  best_checkpoint_name: best_lmf_dualvap_bcd.pt
  early_stop_patience: 15

  ensemble_topk: 5

vap_aux:
  enabled: false

# ③ BC 逐 chunk 密集监督：辅助头预测未来 25 chunk 各自是否为 BC。
#   weight: 辅助损失权重（主损失量级 ~ 密集 BCE，0.5 起步；BC 不动可试 0.3/0.8）。
#   pos_weight: 逐 chunk BC 正例率远低于窗口级 3.65%，固定 20 平衡（可试 12/30）。
#   评估时自动输出 bcdense_best_f1 / bcdense_roc_auc（dense 概率 max 聚合成窗口
#   概率的诊断指标），若显著高于主头 bc_best_f1，推理侧可改用/融合 dense 头。
bc_dense:
  enabled: true
  weight: 0.5
  pos_weight: 20.0

vap_feat:
  enabled: true
  feat_dim: 18
  window: 20
  conv_channels: 64
  frame_rate: 10
  cache_dir: /root/autodl-tmp/finvcup_2026/.cache/vap_ch_kyoto

env:
  HF_HOME: /root/autodl-tmp/finvcup_2026/.cache/huggingface
  TRANSFORMERS_CACHE: /root/autodl-tmp/finvcup_2026/.cache/huggingface
  TORCH_HOME: /root/autodl-tmp/finvcup_2026/.cache/torch
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
