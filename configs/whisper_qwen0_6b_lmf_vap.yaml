seed: 42
chunk_ms: 80
context_chunks: 375
target_chunks: 25
stride: 2
sample_rate: 16000
max_train_samples: null
max_valid_samples: null
num_workers: 8

data_augmentation:
  dynamic_context: true
  min_context_chunks: 125
  max_context_chunks: 375
  context_prob: 0.5

# ============================================================
# VAP 辅助头实验：在调优版(4xL20_tuned)基础上 + VAP 多任务辅助。
# 与 lmf_ensemble_4xL20_tuned 其它超参一致，独立输出目录，便于 A/B 对比 VAP 的净增益。
# ============================================================
paths:
  project_root: /mnt/workspace/dorihue/finvcup_2026
  train_audio_dir: /mnt/workspace/dorihue/finvcup_2026/train/audio
  train_text_dir: /mnt/workspace/dorihue/finvcup_2026/train/text
  train_labels_dir: /mnt/workspace/dorihue/finvcup_2026/train/labels

  output_root: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_vap
  checkpoints_dir: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_vap/checkpoints
  logs_dir: /mnt/workspace/dorihue/finvcup_2026/outputs/lmf_vap/logs

  cache_root: /mnt/workspace/dorihue/finvcup_2026/.cache

labels:
  C: 0
  T: 1
  BC: 2
  I: 3
  NA: 4
  positive_ids: [1, 2, 3]
  multi_targets: [C, NA, I, BC, T]

split:
  valid_ratio: 0.1
  by_conversation: true

audio_encoder:
  type: whisper
  model_name: /mnt/workspace/dorihue/modelscope/whisper-large-v3  # 本地路径，注意核对文件夹真实名字
  proj_dim: 512
  freeze: true
  unfreeze_layers: 2
  tail_ratio: 0.25

text_encoder:
  model_name: /mnt/workspace/dorihue/modelscope/Qwen3-0.6B  # 本地路径
  max_length: 256
  freeze_backbone: true

context_encoder:
  vocab_size: 5
  embed_dim: 24
  channels: [48, 96]
  tail_k: 75

fusion:
  hidden_dim: 320
  bilinear_rank: 64
  dropout: 0.25

train:
  multi_label: true
  pos_weight_mode: capped_per_label
  pos_weight_cap: 8.0
  focal_gamma: 2.0
  label_smoothing: 0.05

  epochs: 40
  max_steps_per_epoch: 500
  eval_valid_sample_count: 30000
  eval_valid_max_batches: null
  eval_valid_shuffle: false

  batch_size: 128
  eval_batch_size: 256
  log_every_steps: 40
  gradient_accumulation_steps: 1

  learning_rate: 1.2e-4
  warmup_ratio: 0.03
  weight_decay: 0.03
  ema_decay: 0.999
  grad_clip_norm: 1.0
  use_amp: true
  use_ema: true

  save_metric: best_f1
  best_checkpoint_name: best_lmf_vap.pt
  early_stop_patience: 15

  ensemble_topk: 5

# ============================================================
# VAP 辅助头（多任务，仅训练用，推理不参与、不进 8B 预算）。
#   目标：预测未来 2s 双声道语音活动 [2 × bins]（能量级 VAD 自监督）。
#   作用：注入"双边时序"归纳偏置，期望提升 BC/I/T，并正则化大批量过拟合。
#   λ=weight；bins=25 即逐 80ms chunk；vad_log_offset 是 VAD 阈值(需在真实数据核对有声率)。
# ============================================================
vap_aux:
  enabled: true
  weight: 0.3
  bins: 25
  vad_log_offset: 2.0

env:
  HF_HOME: /mnt/workspace/dorihue/finvcup_2026/.cache/huggingface
  TRANSFORMERS_CACHE: /mnt/workspace/dorihue/finvcup_2026/.cache/huggingface
  TORCH_HOME: /mnt/workspace/dorihue/finvcup_2026/.cache/torch
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
